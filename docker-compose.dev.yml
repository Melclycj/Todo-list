# Development override — adds live-reload for both the API and frontend.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# NOT for production or VPS: volume mounts replace built images with local
# source directories, bypassing the Dockerfile build at runtime.

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"   # expose API directly for debugging in dev
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: builder   # stop at the build stage — don't bother with Nginx in dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # anonymous volume to keep container node_modules
    environment:
      - VITE_API_BASE_URL=/api/v1
