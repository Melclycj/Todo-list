name: Deploy

on:
  push:
    branches: [main]

# Prevent two deploys running at the same time.
# If a new push arrives while a deploy is in progress, it waits — never cancels.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # SSH into the VPS and run all deploy commands there.
      # VPS_HOST, VPS_USER, VPS_SSH_KEY are stored in GitHub → Settings → Secrets.
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Change /opt/todo-app to wherever the repo is cloned on your VPS.
          script: |
            cd /opt/todo-app
            git pull origin main
            DOCKER_BUILDKIT=1 docker compose build --memory 1g
            docker compose up -d
            docker compose exec -T api alembic upgrade head

      # Wait for Docker to finish starting, then hit the health endpoint.
      # curl --fail exits non-zero on any 4xx/5xx — this fails the workflow
      # if the app did not come up healthy, alerting you before users notice.
      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 https://todolist.cheap/api/health
